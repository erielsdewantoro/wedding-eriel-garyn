      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"

    />

      :root {
        --gold: #c9a84c;
        --dark: #111;
        --gray: #888;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0a;
        color: #f0f0f0;
        min-height: 100vh;
        padding: 32px 16px;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--gold);
        margin-bottom: 4px;
      }
      .subtitle {
        color: var(--gray);
        font-size: 0.85rem;
        margin-bottom: 2rem;
      }

      .config-box {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 1rem;
        align-items: end;
      }
      .config-box label {
        display: block;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--gray);
        margin-bottom: 6px;
      }
      .config-box input {
        width: 100%;
        background: #111;
        border: 1px solid #333;
        color: #f0f0f0;
        padding: 10px 12px;
        font-size: 0.9rem;
        font-family: "Inter", sans-serif;
        outline: none;
      }
      .config-box input:focus {
        border-color: var(--gold);
      }

      .btn {
        padding: 10px 24px;
        background: var(--gold);
        color: #000;
        border: none;
        font-family: "Inter", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn:hover {
        background: #e8c97a;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--gold);
        color: var(--gold);
      }
      .btn-outline:hover {
        background: var(--gold);
        color: #000;
      }
      .btn-sm {
        padding: 6px 14px;
        font-size: 0.7rem;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .stat {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        padding: 1rem;
        text-align: center;
      }
      .stat-num {
        font-size: 1.8rem;
        font-weight: 600;
        color: var(--gold);
      }
      .stat-label {
        font-size: 0.65rem;
        color: var(--gray);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .search-box {
        flex: 1;
        min-width: 200px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #f0f0f0;
        padding: 8px 14px;
        font-family: "Inter", sans-serif;
        font-size: 0.85rem;
        outline: none;
      }
      .search-box:focus {
        border-color: var(--gold);
      }

      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }
      thead tr {
        background: #1a1a1a;
        border-bottom: 1px solid #333;
      }
      th {
        padding: 10px 12px;
        text-align: left;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--gray);
        font-weight: 500;
      }
      td {
        padding: 9px 12px;
        border-bottom: 1px solid #1a1a1a;
        vertical-align: middle;
      }
      tr:hover td {
        background: #111;
      }

      .link-cell {
        color: #60a5fa;
        font-size: 0.75rem;
        word-break: break-all;
        max-width: 340px;
      }
      .copy-link-btn {
        background: transparent;
        border: 1px solid #333;
        color: var(--gray);
        padding: 4px 10px;
        font-size: 0.65rem;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        white-space: nowrap;
      }
      .copy-link-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }

      .no-num {
        color: var(--gray);
      }
      .badge-hadir {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        padding: 2px 8px;
        font-size: 0.65rem;
        border-radius: 2px;
      }
      .badge-belum {
        background: rgba(201, 168, 76, 0.15);
        color: var(--gold);
        padding: 2px 8px;
        font-size: 0.65rem;
        border-radius: 2px;
      }

      .export-section {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        padding: 1.5rem;
        margin-top: 1.5rem;
      }
      .export-section h3 {
        font-size: 0.9rem;
        color: var(--gold);
        margin-bottom: 1rem;
      }
      .export-btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .sql-box {
        background: #0d0d0d;
        border: 1px solid #222;
        padding: 1rem;
        font-family: monospace;
        font-size: 0.75rem;
        color: #a0a0a0;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre;
        margin-top: 1rem;
        display: none;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: #1a1a1a;
        border: 1px solid var(--gold);
        color: #f0f0f0;
        padding: 10px 20px;
        font-size: 0.8rem;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 999;
      }
      .toast.show {
        opacity: 1;
      }

      .pagination {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-top: 1rem;
        flex-wrap: wrap;
      }
      .page-btn {
        background: #1a1a1a;
        border: 1px solid #333;
        color: var(--gray);
        padding: 5px 12px;
        font-size: 0.75rem;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }
      .page-btn.active {
        border-color: var(--gold);
        color: var(--gold);
      }
      .page-btn:hover:not(.active) {
        border-color: #555;
        color: #f0f0f0;
      }
      .page-info {
        color: var(--gray);
        font-size: 0.75rem;
        margin-left: auto;
      }

      @media (max-width: 600px) {
        .config-box {
          grid-template-columns: 1fr;
        }
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎊 Generator Link Undangan Tamu</h1>
      <p class="subtitle">
        Eriel & Garyn Wedding — 800 tamu simulasi dengan link personal
      </p>

      <!-- CONFIG -->
      <div class="config-box">
        <div>
          <label>Base URL Undangan</label>
          <input
            type="text"
            id="baseUrl"
            value="https://eriel-garyn.vercel.app"
            placeholder="https://domain-kamu.com"
          />
        </div>
        <div>
          <label>Jumlah Tamu</label>
          <input type="number" id="guestCount" value="800" min="1" max="800" />
        </div>
        <button class="btn" onclick="generateGuests()">🔄 Generate</button>
      </div>

      <!-- STATS -->
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">Total Tamu</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="statLinks">0</div>
          <div class="stat-label">Link Dibuat</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="statOpened">0</div>
          <div class="stat-label">Sudah Buka</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="statHadir">0</div>
          <div class="stat-label">Konfirmasi</div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <input
          class="search-box"
          type="text"
          id="searchBox"
          placeholder="🔍 Cari nama tamu..."
          oninput="filterTable()"
        />
        <button class="btn btn-outline btn-sm" onclick="copyAllLinks()">
          📋 Copy Semua Link
        </button>
        <button class="btn btn-outline btn-sm" onclick="showSql()">
          🗄️ Lihat SQL
        </button>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <table id="guestTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Nama Tamu</th>
              <th>Link Personal</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div class="pagination" id="pagination"></div>

      <!-- EXPORT -->
      <div class="export-section">
        <h3>📤 Export Data</h3>
        <div class="export-btns">
          <button class="btn btn-sm" onclick="exportCSV()">
            ⬇️ Download CSV
          </button>
          <button class="btn btn-outline btn-sm" onclick="exportTxt()">
            ⬇️ Download TXT (Link saja)
          </button>
          <button class="btn btn-outline btn-sm" onclick="exportSQL()">
            ⬇️ Download SQL (Insert)
          </button>
        </div>
        <div class="sql-box" id="sqlBox"></div>
      </div>
    </div>

          .replace(/[^a-z0-9\s-]/g, "")

          .replace(/\s+/g, "-");
      }

          .join("");
      }

      function renderPagination() {
        const totalPages = Math.ceil(filteredGuests.length / PER_PAGE);
        const pag = document.getElementById("pagination");

        let html = "";

        // Prev
        html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled style="opacity:0.3"' : ""}>←</button>`;

        // Pages (show max 7)
        const pages = [];
        if (totalPages <= 7) {
          for (let i = 1; i <= totalPages; i++) pages.push(i);
        } else {
          pages.push(1);
          if (currentPage > 3) pages.push("...");
          for (
            let i = Math.max(2, currentPage - 1);
            i <= Math.min(totalPages - 1, currentPage + 1);
            i++
          )
            pages.push(i);
          if (currentPage < totalPages - 2) pages.push("...");
          pages.push(totalPages);
        }

        pages.forEach(function (p) {
          if (p === "...") {
            html += `<span style="color:#555;padding:0 4px">…</span>`;
          } else {
            html += `<button class="page-btn ${p === currentPage ? "active" : ""}" onclick="goPage(${p})">${p}</button>`;
          }
        });

        // Next
        html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled style="opacity:0.3"' : ""}>→</button>`;

        html += `<span class="page-info">Halaman ${currentPage} dari ${totalPages} — ${filteredGuests.length} tamu</span>`;

        pag.innerHTML = html;
      }

      function goPage(p) {
        const totalPages = Math.ceil(filteredGuests.length / PER_PAGE);
        if (p < 1 || p > totalPages) return;
        currentPage = p;
        renderTable();
        renderPagination();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function filterTable() {
        const q = document.getElementById("searchBox").value.toLowerCase();
        filteredGuests = allGuests.filter((g) =>
          g.name.toLowerCase().includes(q),
        );
        currentPage = 1;
        renderTable();
        renderPagination();
      }

      function copySingle(url, name) {
        navigator.clipboard.writeText(url).then(function () {
          showToast(`✅ Link ${name} disalin!`);
        });
      }

      function copyAllLinks() {
        const text = allGuests.map((g) => `${g.name}: ${g.url}`).join("\n");
        navigator.clipboard.writeText(text).then(function () {
          showToast(`✅ ${allGuests.length} link berhasil disalin!`);
        });
      }

      function exportCSV() {
        const header = "No,Nama,URL,Status\n";
        const rows = allGuests
          .map((g) => `${g.no},"${g.name}","${g.url}","${g.status}"`)
          .join("\n");
        downloadFile("daftar-tamu-eriel-garyn.csv", header + rows, "text/csv");
        showToast("✅ CSV berhasil didownload!");
      }

      function exportTxt() {
        const text = allGuests.map((g) => g.url).join("\n");
        downloadFile("link-undangan-eriel-garyn.txt", text, "text/plain");
        showToast("✅ TXT berhasil didownload!");
      }

      function exportSQL() {
        const values = allGuests
          .map((g) => `('${g.name.replace(/'/g, "''")}', '${g.slug}')`)
          .join(",\n  ");
        const sql = `-- Insert 800 tamu ke Supabase\nINSERT INTO guests (name, slug) VALUES\n  ${values};`;

        document.getElementById("sqlBox").textContent = sql;
        document.getElementById("sqlBox").style.display = "block";
        downloadFile("insert-guests.sql", sql, "text/sql");
        showToast("✅ SQL berhasil didownload!");
      }

      function showSql() {
        if (allGuests.length === 0) {
          showToast("⚠️ Generate dulu!");
          return;
        }
        const values = allGuests
          .slice(0, 10)
          .map((g) => `('${g.name.replace(/'/g, "''")}', '${g.slug}')`)
          .join(",\n  ");
        const sql = `-- Preview 10 dari ${allGuests.length} tamu\nINSERT INTO guests (name, slug) VALUES\n  ${values},\n  ... dst;`;
        const box = document.getElementById("sqlBox");
        box.textContent = sql;
        box.style.display = box.style.display === "none" ? "block" : "none";
      }

      function downloadFile(filename, content, type) {
        const blob = new Blob([content], { type });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
      }

      let toastTimer;
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
      }

      // Auto generate saat halaman load
      window.addEventListener("load", generateGuests);
    </script>
  </body>
</html>
